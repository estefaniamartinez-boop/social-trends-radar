name: Daily Social Trend Radar

on:
  schedule:
    - cron: '0 11 * * *'   # 11:00 UTC ≈ 7:00 AM US Eastern — adjust to your timezone
  workflow_dispatch: {}     # lets you trigger a run manually from the Actions tab

permissions:
  contents: write           # needed to publish to the gh-pages branch

concurrency:
  group: trend-radar
  cancel-in-progress: false

jobs:
  radar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run the radar
        env:
          TOP_N: '4'
          SITE_URL: 'https://estefaniamartinez-boop.github.io/social-trends-radar'
          # Optional & FREE — only set these two repo secrets if DuckDuckGo ever
          # gets rate-limited on GitHub's runners; otherwise leave them unset and
          # the free keyless search is used. No payment either way.
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
        run: npm start

      - name: Publish dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true    # keeps historical /data and /cards from prior runs
